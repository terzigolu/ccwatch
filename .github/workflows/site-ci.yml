name: site CI

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/site-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/site-ci.yml'

jobs:
  build:
    name: typecheck + test + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Bundle size check
        run: |
          set -e
          INITIAL_GZ=$(gzip -c dist/assets/index-*.js | wc -c)
          echo "Initial JS bundle (gzipped): ${INITIAL_GZ} bytes"
          if [ "${INITIAL_GZ}" -gt 80000 ]; then
            echo "::error::Initial JS bundle exceeded 80KB gzipped budget"
            exit 1
          fi
          echo "::notice::Initial JS bundle within budget"
